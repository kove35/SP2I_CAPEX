services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sp2i_capex
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - sp2i_capex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sp2i_capex"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: >
      sh -c "pip install -r requirements.txt &&
      uvicorn app.main:app --app-dir 07_API_BACKEND --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://user:password@postgres:5432/sp2i_capex
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app/08_FRONTEND
    volumes:
      - ..:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  sp2i_capex_pgdata:
