services:
  api:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: >
      sh -c "pip install -r requirements.txt &&
      uvicorn app.main:app --app-dir 07_API_BACKEND --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: node:22-alpine
    working_dir: /app/08_FRONTEND
    volumes:
      - ..:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - api
