databases:
  - name: sp2i-postgres
    databaseName: sp2i_capex
    user: sp2i_user
    plan: free

services:
  - type: web
    name: sp2i-backend
    runtime: python
    rootDir: .
    plan: free
    region: frankfurt
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r 07_API_BACKEND/requirements.txt

    startCommand: python 07_API_BACKEND/start_render.py

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8

      - key: ENVIRONMENT
        value: render-test

      - key: LOG_LEVEL
        value: INFO

      - key: SP2I_CLOUD_MODE
        value: "true"

      - key: SP2I_DATASET_VERSION
        value: V1_ENTERPRISE

      - key: DATABASE_URL
        fromDatabase:
          name: sp2i-postgres
          property: connectionString

      - key: DB_POOL_SIZE
        value: "5"

      - key: DB_MAX_OVERFLOW
        value: "10"

      - key: FRONTEND_URL
        sync: false

      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:3000

      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app

      - key: OPENAI_API_KEY
        sync: false

      - key: OPENAI_FAST_MODEL
        value: gpt-4.1-mini

      - key: OPENAI_HEAVY_MODEL
        value: gpt-4.1

      - key: MAX_UPLOAD_MB
        value: "25"

      - key: ALLOWED_EXTENSIONS
        value: xlsx,xls,csv,pdf

      - key: PROCUREMENT_DEFAULT_COUNTRY
        value: china

      - key: PROCUREMENT_DEFAULT_CURRENCY
        value: FCFA

      - key: ANALYTICS_CACHE_TTL
        value: "300"