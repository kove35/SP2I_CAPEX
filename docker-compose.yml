services:
  postgres:
    image: postgres:16-alpine
    container_name: sp2i_capex_postgres
    environment:
      POSTGRES_DB: sp2i_capex
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - sp2i_capex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sp2i_capex"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: 07_API_BACKEND/Dockerfile
    container_name: sp2i_capex_api
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/sp2i_capex
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  sp2i_capex_pgdata:
