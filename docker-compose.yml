services:
  postgres:
    image: postgres:16-alpine
    container_name: sp2i_capex_postgres
    environment:
      POSTGRES_DB: sp2i_capex
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - sp2i_capex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sp2i_capex"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: 07_API_BACKEND/Dockerfile
    container_name: sp2i_capex_api
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/sp2i_capex
      ENVIRONMENT: docker
      FRONTEND_URL: http://localhost:8501
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8501
      MAX_UPLOAD_MB: "25"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  streamlit:
    build:
      context: .
      dockerfile: 08_FRONTEND_STREAMLIT/Dockerfile
    container_name: sp2i_streamlit
    environment:
      API_URL: http://backend:8000
      POWERBI_DIRECTION_URL: ${POWERBI_DIRECTION_URL:-}
      POWERBI_FINANCE_URL: ${POWERBI_FINANCE_URL:-}
      POWERBI_IMPORT_URL: ${POWERBI_IMPORT_URL:-}
      POWERBI_CHANTIER_URL: ${POWERBI_CHANTIER_URL:-}
      POWERBI_DQE_URL: ${POWERBI_DQE_URL:-}
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  sp2i_capex_pgdata:
